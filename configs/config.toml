[mesh]
Nx = 512
Ny = 512

[bathymetry]
type = "flat"

[boundary]
type = "reflecting"

[initial_condition]
type = "still_water"
amplitude = 0.2
x0 = 0.5
y0 = 0.5
sigma_x = 0.05
sigma_y = 0.05
u0 = 0.0
v0 = 0.0

[spatial]
scheme = "finite_volume"
reconstruction = "muscl"
limiter = "minmod"
flux = "rusanov"
positivity_preserving = true

[time]
integrator = "ssp_rk3"
cfl = 0.45
t_end = 0.2
output_interval = 0.01

[backend]
type = "openmp"
threads = 32

[output]
format = "netcdf4"
path = "output/gaussian_rusanov_rk3.nc"