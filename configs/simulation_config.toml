[mesh]
Lx = 10         # domain length in x
Ly = 10         # domain length in y
nG = 2          # number of ghost cells
Nx = 50         # spatial resolution in x
Ny = 50         # spatial resolution in y
spatial_unit_x = "m"
spatial_unit_y = "m"
spatial_unit_h = "m"

[bathymetry]
type = "Flat"

[boundary]
type = "ReflectingWalls"

[initial_condition]
type = "GaussInitial"       # [GaussInitial, StillWater]
peak_height = 3.0
x0 = 3.0
y0 = 7.0
sigma_x = 2
sigma_y = 0.7
h0 = 2.0        # for GaussInitial OR StillWater

[solver]
reconstruction = "PiecewiseConst"       # [PiecewiseConst, MUSCL]
riemann = "HLL"                     # [Rusanov, HLL, ROE]
time = "SSPRK3"
limiter = "minmod"
positivity_preserving = true

[time]
end_time = 5.0
time_steps = 800
cfl = 0.45
time_unit = "s"
save_every = 10        # every * step gets written out

[backend]
type = "serial"
threads = 2

[sanity_checks]
mass_conservation = false        # [true, false] -> throws runtime errors and exits programs | default threshold: 1e-10
mass_threshold = 1e-13
positivity = true
debug = true                    # only this will print into output_path
output_path = "output/sanity_checks.nc"

[output]
compute_eta = true              # estimates ETA (based on first 100 time steps)
path = "output/simulation.nc"